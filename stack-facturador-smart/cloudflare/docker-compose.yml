version: '3.7'  # <- Cambiar aquí
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - proxynet
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s  # Ahora sí es compatible
    labels:
      - "com.docker.compose.project=cloudflare-tunnel"
      - "com.docker.compose.service=cloudflared"
      - "description=Cloudflare Tunnel - Secure tunnel to the internet"
networks:
  proxynet:
    external: true